services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: diagnostician
      POSTGRES_PASSWORD: diagnostician
      POSTGRES_DB: diagnostician
    ports:
      - "5432:5432"
    volumes:
      - diagnostician-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diagnostician -d diagnostician"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DIAGNOSTICIAN_DATABASE_URL: postgresql+psycopg://diagnostician:diagnostician@postgres:5432/diagnostician
      DIAGNOSTICIAN_OLLAMA_BASE_URL: http://host.docker.internal:11434
      DIAGNOSTICIAN_GENERATION_MODEL: ${DIAGNOSTICIAN_GENERATION_MODEL:-qwen3:4b-instruct}
      DIAGNOSTICIAN_CASE_GENERATOR_MODEL: ${DIAGNOSTICIAN_CASE_GENERATOR_MODEL:-qwen3:4b-instruct}
      DIAGNOSTICIAN_MEDICAL_CHECK_MODEL: ${DIAGNOSTICIAN_MEDICAL_CHECK_MODEL:-hf.co/tensorblock/Llama3-Med42-8B-GGUF}
      DIAGNOSTICIAN_MEDICAL_CHECK_ENABLED: ${DIAGNOSTICIAN_MEDICAL_CHECK_ENABLED:-false}
      DIAGNOSTICIAN_OLLAMA_KEEP_ALIVE: ${DIAGNOSTICIAN_OLLAMA_KEEP_ALIVE:-5m}
      DIAGNOSTICIAN_GENERATION_REPAIR_ATTEMPTS: ${DIAGNOSTICIAN_GENERATION_REPAIR_ATTEMPTS:-2}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic -c backend/alembic.ini upgrade head &&
      python -m diagnostician.ingestion.cli seed-demo --path cases/source &&
      uvicorn diagnostician.api.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cases:/app/cases:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  diagnostician-postgres:
